<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sword blade -->
  <path d="M32 4 L36 28 L32 32 L28 28 Z" fill="#c0d8f0" stroke="#8ab4e0" stroke-width="0.5"/>
  <!-- Blade highlight -->
  <path d="M32 6 L34 26 L32 30 Z" fill="#e0eef8" opacity="0.6"/>
  <!-- Guard (crossguard) -->
  <rect x="22" y="30" width="20" height="4" rx="1" fill="#c89b3c"/>
  <rect x="24" y="31" width="16" height="2" rx="0.5" fill="#ddb84d" opacity="0.6"/>
  <!-- Grip -->
  <rect x="29" y="34" width="6" height="14" rx="1" fill="#8b6914"/>
  <rect x="30" y="35" width="2" height="12" rx="0.5" fill="#a07818" opacity="0.5"/>
  <!-- Pommel -->
  <circle cx="32" cy="50" r="3.5" fill="#c89b3c"/>
  <circle cx="31" cy="49" r="1" fill="#ddb84d" opacity="0.6"/>
  <!-- Snowflakes -->
  <!-- Flake 1 (top-left) -->
  <g transform="translate(12,12)" fill="#fff" opacity="0.9">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#fff" stroke-width="1.2"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#fff" stroke-width="1.2"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#fff" stroke-width="0.8"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#fff" stroke-width="0.8"/>
    <circle r="1.2" fill="#fff"/>
  </g>
  <!-- Flake 2 (top-right) -->
  <g transform="translate(52,16)" fill="#fff" opacity="0.7">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#fff" stroke-width="1"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#fff" stroke-width="0.6"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#fff" stroke-width="0.6"/>
    <circle r="0.8" fill="#fff"/>
  </g>
  <!-- Flake 3 (mid-left) -->
  <g transform="translate(10,38)" fill="#fff" opacity="0.5">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#fff" stroke-width="0.8"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#fff" stroke-width="0.8"/>
    <circle r="0.7" fill="#fff"/>
  </g>
  <!-- Flake 4 (bottom-right) -->
  <g transform="translate(54,42)" fill="#fff" opacity="0.6">
    <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#fff" stroke-width="0.8"/>
    <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#fff" stroke-width="0.8"/>
    <circle r="0.6" fill="#fff"/>
  </g>
  <!-- Flake 5 (small, near blade) -->
  <g transform="translate(44,8)" fill="#fff" opacity="0.4">
    <line x1="0" y1="-2" x2="0" y2="2" stroke="#fff" stroke-width="0.6"/>
    <line x1="-2" y1="0" x2="2" y2="0" stroke="#fff" stroke-width="0.6"/>
    <circle r="0.5" fill="#fff"/>
  </g>
  <!-- Snow dots -->
  <circle cx="18" cy="52" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="48" cy="28" r="0.8" fill="#fff" opacity="0.35"/>
  <circle cx="8" cy="24" r="0.7" fill="#fff" opacity="0.25"/>
</svg>
